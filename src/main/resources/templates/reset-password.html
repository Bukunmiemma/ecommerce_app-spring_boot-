<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Reset Password</title>
</head>
<body>
<h2>Reset Password</h2>

<form action="/reset-password" method="post">

    <input type="hidden" name="token" value="${token}" />

    <input type="password"
           name="newPassword"
           placeholder="Enter new password" />

    <button type="submit">
        Reset Password
    </button>

</form>
</body>
</html>
