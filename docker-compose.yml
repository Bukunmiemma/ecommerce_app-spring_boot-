
      services:
        app:
          build: .
          ports:
            - "8080:8080"
          depends_on:
            - postgres
          env_file:
            - .env
          environment:
            SPRING_PROFILES_ACTIVE: prod

        postgres:
          image: postgres:16
          restart: always
          env_file:
            - .env
          environment:
            POSTGRES_DB: ecommerce_db
            POSTGRES_USER: postgres
            POSTGRES_PASSWORD: "@Bkgraphics38"
          ports:
            - "5432:5432"
          volumes:
            - postgres_data:/var/lib/postgresql/data

      volumes:
            postgres_data:

